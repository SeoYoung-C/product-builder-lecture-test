<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tonight's Dinner Picker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div class="language-switch">
            <a href="./index.html" class="lang-link">한국어</a>
        </div>
        <button id="theme-toggle" class="theme-btn">🌙</button>
        <h1>What should I eat tonight?</h1>
        <p class="subtitle">Pick your preferences and get a dinner recommendation.</p>

        <div class="controls">
            <label class="control">
                <span>Cuisine</span>
                <select id="cuisine-select">
                    <option value="all">All</option>
                    <option value="Korean">Korean</option>
                    <option value="Chinese">Chinese</option>
                    <option value="Japanese">Japanese</option>
                    <option value="Western">Western</option>
                    <option value="Street Food">Street Food</option>
                    <option value="Fast Food">Fast Food</option>
                </select>
            </label>

            <label class="control">
                <span>Mood</span>
                <select id="mood-select">
                    <option value="all">Any</option>
                    <option value="Hearty">Hearty</option>
                    <option value="Light">Light</option>
                    <option value="Warm">Warm</option>
                    <option value="Spicy">Spicy</option>
                </select>
            </label>
        </div>

        <div id="dinner-result">
            <p>Click the button to get tonight's dinner recommendation.</p>
        </div>
        <button id="generate-btn">Recommend Dinner</button>
    </div>
    <script src="main-en.js"></script>
</body>
</html>
